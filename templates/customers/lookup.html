{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Seed Society</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:  #3a6b35;
      --border: #ddd;
      --bg:     #fafaf8;
      --text:   #1a1a1a;
      --muted:  #666;
      --radius: 6px;
    }
    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .hero {
      text-align: center;
      margin-bottom: 2rem;
    }
    .hero-img {
      width: 220px;
      height: 220px;
      object-fit: cover;
      border-radius: 50%;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      margin-bottom: 1.25rem;
    }
    .hero-wordmark {
      height: 52px;
      width: auto;
      display: block;
      margin: 0 auto .5rem;
    }
    .hero p {
      color: var(--muted);
      font-size: .95rem;
      max-width: 320px;
      margin: 0 auto;
      line-height: 1.55;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }

    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .3rem; color: var(--muted); }
    input[type="tel"], input[type="text"] {
      width: 100%;
      padding: .55rem .75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: .95rem;
      background: #fff;
    }
    input:focus { outline: 2px solid var(--green); outline-offset: 1px; }

    .btn {
      display: block;
      width: 100%;
      padding: .65rem 1rem;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .88; }

    .footer-note {
      margin-top: 1.25rem;
      color: var(--muted);
      font-size: .8rem;
      text-align: center;
    }

    .messages { width: 100%; max-width: 380px; margin-bottom: 1rem; }
    .message { padding: .6rem 1rem; border-radius: var(--radius); font-size: .9rem; }
    .message-error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>

{% if messages %}
  <div class="messages">
    {% for msg in messages %}
      <div class="message message-{{ msg.tags }}">{{ msg }}</div>
    {% endfor %}
  </div>
{% endif %}

<div class="hero">
  <img src="{% static 'img/logo-seedling-icon.jpg' %}" alt="" class="hero-img">
  <img src="{% static 'img/logo-seedling-society.png' %}" alt="The Seed Society" class="hero-wordmark">
  <p>A community farmers market — direct from local farms to your table.</p>
</div>

<div class="card">
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="phone">Phone number</label>
      <input type="tel" id="phone" name="phone" placeholder="(850) 555-0100" required autofocus>
    </div>
    <div class="form-group">
      <label for="first_name">First name <span style="font-weight:400; color:#999;">(optional)</span></label>
      <input type="text" id="first_name" name="first_name" placeholder="Your first name">
    </div>
    <button type="submit" class="btn">Continue</button>
  </form>
</div>

<p class="footer-note">New? We'll create your account automatically.</p>

</body>
</html>
